language: java

# Use Ubuntu 20.04 LTS
dist: focal

# JDK 23
jdk:
  - openjdk23

# Cache dependencies to speed up builds
cache:
  directories:
    - $HOME/.m2
    - $HOME/.gradle

before_install:
  # Download and setup JavaFX 23
  - wget https://download2.gluonhq.com/openjfx/23/openjfx-23_linux-x64_bin-sdk.zip
  - unzip openjfx-23_linux-x64_bin-sdk.zip
  - export PATH_TO_FX=javafx-sdk-23/lib
  
  # Make sure we have the latest JDK 23
  - |
    if [ ! -d "$HOME/jdk-23" ]; then
      wget https://download.oracle.com/java/23/latest/jdk-23_linux-x64_bin.tar.gz
      tar -xzf jdk-23_linux-x64_bin.tar.gz -C $HOME
      mv $HOME/jdk-23* $HOME/jdk-23
    fi
  - export JAVA_HOME=$HOME/jdk-23
  - export PATH=$JAVA_HOME/bin:$PATH
  - java -version

# Set up display for headless testing (even though we're not running GUI tests)
before_script:
  - export DISPLAY=:99.0
  
script:
  # Create necessary directories for compiled classes
  - mkdir -p build/classes
  - mkdir -p build/test-classes
  
  # Compile all source files including the H2 database dependency
  - echo "Compiling FoundationCode with H2 database..."
  - |
    javac -d build/classes \
      -cp "FoundationCode/lib/h2-2.3.232.jar:$PATH_TO_FX/*" \
      --module-path "$PATH_TO_FX" \
      --add-modules javafx.controls,javafx.fxml \
      FoundationCode/src/application/*.java \
      FoundationCode/src/databasePart1/*.java || true
  
  # Compile PasswordEvaluationTestbed
  - echo "Compiling PasswordEvaluationTestbed..."
  - |
    javac -d build/classes \
      -cp "$PATH_TO_FX/*" \
      --module-path "$PATH_TO_FX" \
      --add-modules javafx.controls,javafx.fxml \
      passwordEvaluationTestbed/src/passwordEvaluationTestbed/*.java || true
  
  # Compile UserNameRecognizerTestbed (this one is console-based)
  - echo "Compiling UserNameRecognizerTestbed..."
  - |
    javac -d build/classes \
      userNameRecognizerTestbed/src/userNameRecognizerTestbed/*.java
  
  # Test 1: Run UserNameRecognizerTestbed with test input (console app)
  - echo "Testing UserNameRecognizerTestbed (console application)..."
  - |
    echo -e "testuser123\ntest@user\n\n" | java -cp build/classes \
      userNameRecognizerTestbed.UserNameRecognizerTestbed || true
  
  # Test 2: Check if StartCSE360 compiles and can be instantiated (smoke test)
  - echo "Smoke test for StartCSE360..."
  - |
    java -cp "build/classes:FoundationCode/lib/h2-2.3.232.jar:$PATH_TO_FX/*" \
      --module-path "$PATH_TO_FX" \
      --add-modules javafx.controls,javafx.fxml,javafx.graphics \
      -Djava.awt.headless=true \
      -Dtestfx.robot=glass \
      -Dtestfx.headless=true \
      -Dprism.order=sw \
      -Dprism.text=t2k \
      --add-opens javafx.graphics/com.sun.javafx.application=ALL-UNNAMED \
      -version || true
  
  # Test 3: Verify all main classes exist
  - echo "Verifying main classes are compiled..."
  - ls -la build/classes/application/ || true
  - ls -la build/classes/passwordEvaluationTestbed/ || true
  - ls -la build/classes/userNameRecognizerTestbed/ || true
  
  # Test 4: Run basic compilation test to ensure no syntax errors
  - echo "Build completed successfully!"

# Additional build matrix if you want to test on multiple JDK versions
matrix:
  allow_failures:
    - jdk: openjdk22
  fast_finish: true

# Notify on build status
notifications:
  email:
    on_success: change
    on_failure: always
