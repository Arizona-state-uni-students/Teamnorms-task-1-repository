# Travis CI Configuration for Teamnorms Task Repository
language: java

# Java version
jdk:
  - openjdk24

# Ubuntu version
dist: focal

# Build only these branches
branches:
  only:
    - Dev
    - main
    - /^feature\/.*$/
    - /^hotfix\/.*$/

# Cache Maven dependencies for faster builds
cache:
  directories:
    - $HOME/.m2

# Environment variables
env:
  global:
    - MAVEN_OPTS="-Xmx512m"

# Install dependencies
install:
  - mvn clean install -DskipTests=true -Dmaven.javadoc.skip=true -B -V

# Build matrix for different stages
jobs:
  include:
    # Stage 1: Validation
    - stage: "Validation"
      name: "Validate and Compile"
      script:
        - echo "Validating project structure..."
        - mvn clean validate -B
        - echo "Compiling source code..."
        - mvn compile -B

    # Stage 2: Unit Tests
    - stage: "Test"
      name: "Run Unit Tests"
      script:
        - echo "Running unit tests..."
        - mvn clean test -B
      after_success:
        - echo "All tests passed!"

    # Stage 3: Build JAR
    - stage: "Build"
      name: "Build Application"
      script:
        - echo "Building JavaFX application..."
        - mvn clean package -B -DskipTests=true
        - echo "Verifying JAR creation..."
        - ls -la target/*.jar
      after_success:
        - mkdir -p artifacts
        - cp target/*.jar artifacts/
        - echo "Build artifacts saved to artifacts/"

    # Stage 4: PR Validation (only for pull requests)
    - stage: "PR Check"
      name: "Pull Request Validation"
      if: type = pull_request
      script:
        - echo "Validating PR from ${TRAVIS_PULL_REQUEST_BRANCH} to ${TRAVIS_BRANCH}"
        - echo "Running comprehensive checks..."
        
        # Check for merge conflicts
        - git fetch origin ${TRAVIS_BRANCH}:${TRAVIS_BRANCH}
        - |
          if git merge-tree $(git merge-base HEAD ${TRAVIS_BRANCH}) HEAD ${TRAVIS_BRANCH} | grep -q "<<<<<<<"; then
            echo "Error: Merge conflicts detected!"
            exit 1
          else
            echo "✓ No merge conflicts"
          fi
        
        # Run all validation steps
        - mvn clean compile test package -B
        
        # Check for TODO comments
        - |
          TODO_COUNT=$(grep -r "TODO" --include="*.java" src/ | wc -l)
          if [ $TODO_COUNT -gt 5 ]; then
            echo "Warning: Found $TODO_COUNT TODO comments"
          fi
        
        # Check for System.out.println in main code
        - |
          SYSOUT_COUNT=$(grep -r "System.out.println" --include="*.java" src/main/ | wc -l)
          if [ $SYSOUT_COUNT -gt 0 ]; then
            echo "Warning: Found $SYSOUT_COUNT System.out.println statements in main code"
          fi

    # Stage 5: Deploy to Dev (after merge)
    - stage: "Deploy"
      name: "Deploy to Development"
      if: branch = Dev AND type = push AND NOT type = pull_request
      script:
        - echo "Deploying to development environment..."
        - mvn clean package -B -DskipTests=true
        - echo "Deployment ready for dev branch"
        # Add actual deployment commands here if needed

# Define stage order
stages:
  - name: "Validation"
    if: type IN (push, pull_request)
  - name: "Test"
    if: type IN (push, pull_request)
  - name: "Build"
    if: type IN (push, pull_request)
  - name: "PR Check"
    if: type = pull_request
  - name: "Deploy"
    if: branch = Dev AND type = push

# Default script (fallback)
script:
  - mvn clean test -B

# After success
after_success:
  - echo "Build successful on branch ${TRAVIS_BRANCH}"

# After failure
after_failure:
  - echo "Build failed on branch ${TRAVIS_BRANCH}"
  - cat target/surefire-reports/*.txt || true