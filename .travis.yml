language: java

# Use Ubuntu 22.04 LTS
dist: jammy

# Use JDK 21 (stable and well-supported)
jdk:
  - openjdk21

# Cache dependencies to speed up builds
cache:
  directories:
    - $HOME/.m2
    - $HOME/.gradle
    - $HOME/javafx-sdk-21

before_install:
  # Download and setup JavaFX 21
  - |
    if [ ! -d "$HOME/javafx-sdk-21" ]; then
      wget -q https://download2.gluonhq.com/openjfx/21/openjfx-21_linux-x64_bin-sdk.zip
      unzip -q openjfx-21_linux-x64_bin-sdk.zip -d $HOME
      mv $HOME/javafx-sdk-21* $HOME/javafx-sdk-21
    fi
  - export PATH_TO_FX=$HOME/javafx-sdk-21/lib
  
  # Verify Java version
  - java -version
  - javac -version

before_script:
  # Set up display for headless mode
  - export DISPLAY=:99.0
  
script:
  # First, let's understand the repository structure
  - echo "=== Current Directory ==="
  - pwd
  - echo "=== Repository Root Contents ==="
  - ls -la
  
  # Find ALL directories
  - echo "=== All Directories in Repository ==="
  - find . -type d -name "*" | grep -v "\.git" | sort
  
  # Find ALL Java files with their full paths
  - echo "=== All Java Files in Repository ==="
  - find . -name "*.java" -type f | sort
  
  # Find specific important files
  - echo "=== Looking for Main Classes ==="
  - find . -name "StartCSE360.java" -o -name "PasswordEvaluationGUITestbed.java" -o -name "UserNameRecognizerTestbed.java"
  
  # Find JAR files (like H2 database)
  - echo "=== Looking for JAR files ==="
  - find . -name "*.jar" -type f
  
  # Check if maybe everything is in src directory at root
  - echo "=== Checking common directory patterns ==="
  - ls -la src/ 2>/dev/null || echo "No src/ directory at root"
  - ls -la FoundationCode/ 2>/dev/null || echo "No FoundationCode/ directory"
  - ls -la passwordEvaluationTestbed/ 2>/dev/null || echo "No passwordEvaluationTestbed/ directory"
  - ls -la userNameRecognizerTestbed/ 2>/dev/null || echo "No userNameRecognizerTestbed/ directory"
  
  # Create build directories
  - mkdir -p build/classes
  
  # Now let's try to compile based on what we find
  - echo "=== Attempting Smart Compilation ==="
  
  # Find and compile all Java files in one go (brute force approach)
  - |
    JAVA_FILES=$(find . -name "*.java" -type f | grep -v "\.git")
    if [ ! -z "$JAVA_FILES" ]; then
      echo "Found Java files, attempting compilation..."
      
      # First try: Compile everything together
      echo "Attempting to compile all Java files together..."
      
      # Find H2 jar location
      H2_JAR=$(find . -name "h2*.jar" -type f | head -1)
      if [ ! -z "$H2_JAR" ]; then
        echo "Found H2 JAR at: $H2_JAR"
        CLASSPATH="$H2_JAR:$PATH_TO_FX/*"
      else
        echo "No H2 JAR found, using only JavaFX classpath"
        CLASSPATH="$PATH_TO_FX/*"
      fi
      
      # Try to compile all Java files
      javac -d build/classes \
        -cp "$CLASSPATH" \
        --module-path "$PATH_TO_FX" \
        --add-modules javafx.controls,javafx.fxml \
        $(find . -name "*.java" -type f | grep -v "\.git" | tr '\n' ' ') 2>&1 | head -50
      
      # Check if compilation was successful
      if [ $? -eq 0 ]; then
        echo "Compilation successful!"
      else
        echo "Compilation failed. Trying file by file approach..."
        
        # Try compiling each directory separately
        for dir in $(find . -type d -name "src" | grep -v "\.git"); do
          echo "Trying to compile files in $dir..."
          javac -d build/classes \
            -cp "$CLASSPATH" \
            --module-path "$PATH_TO_FX" \
            --add-modules javafx.controls,javafx.fxml \
            $dir/**/*.java 2>&1 | head -20 || true
        done
      fi
    else
      echo "ERROR: No Java files found in repository!"
      echo "Please ensure your code is properly committed to the repository"
      exit 1
    fi
  
  # List compiled classes
  - echo "=== Checking Compiled Classes ==="
  - find build/classes -name "*.class" -type f | head -20 || echo "No classes compiled"
  - echo "Total compiled classes: $(find build/classes -name '*.class' -type f | wc -l)"
  
  # Try to run UserNameRecognizerTestbed if it was compiled
  - echo "=== Attempting to run UserNameRecognizerTestbed ==="
  - |
    # Find the actual package structure from compiled classes
    USERNAME_CLASS=$(find build/classes -name "UserNameRecognizerTestbed.class" -type f | head -1)
    if [ ! -z "$USERNAME_CLASS" ]; then
      # Extract package path from file location
      PACKAGE_PATH=$(echo $USERNAME_CLASS | sed 's|build/classes/||' | sed 's|/UserNameRecognizerTestbed.class||' | tr '/' '.')
      echo "Found UserNameRecognizerTestbed in package: $PACKAGE_PATH"
      echo -e "testuser123\ntest@user\n\n" | timeout 5s java -cp build/classes ${PACKAGE_PATH}.UserNameRecognizerTestbed || echo "Test completed"
    else
      echo "UserNameRecognizerTestbed.class not found"
    fi
  
  # Final summary
  - echo "=== Build Summary ==="
  - |
    TOTAL_JAVA=$(find . -name "*.java" -type f | grep -v "\.git" | wc -l)
    TOTAL_CLASS=$(find build/classes -name "*.class" -type f 2>/dev/null | wc -l)
    echo "Total Java source files found: $TOTAL_JAVA"
    echo "Total compiled class files: $TOTAL_CLASS"
    
    if [ "$TOTAL_JAVA" -eq 0 ]; then
      echo "ERROR: No Java source files found in the repository!"
      echo "Please check that your files are committed and pushed to GitHub"
      exit 1
    elif [ "$TOTAL_CLASS" -eq 0 ]; then
      echo "WARNING: Source files found but compilation failed"
      echo "Check the compilation errors above"
      exit 1
    else
      echo "Build successful: $TOTAL_CLASS classes compiled from $TOTAL_JAVA source files"
    fi

# Matrix configuration
matrix:
  fast_finish: true

# Notifications
notifications:
  email:
    on_success: change
    on_failure: always
